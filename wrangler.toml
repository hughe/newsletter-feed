# Worker config. See PLAN.md "Build & deploy" for the full setup steps.
name = "newsletter-rss"
main = "index.ts"
compatibility_date = "2025-01-01"

# D1 binding. Create the database once with:
#   npx wrangler d1 create newsletters
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "newsletters"
database_id = "99e5d04c-4202-4607-abc2-a9837acee9e3"

[vars]
# RSS channel title.
FEED_TITLE = "Forwarded Newsletters"
# FEED_TOKEN gates ALL URLs (feed + admin). NOT stored here (this file is in
# git). It is set as an encrypted secret instead:
#   npx wrangler secret put FEED_TOKEN
# Generate a value with: openssl rand -hex 24
